name: Morning Summary (8h Quebec)

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  summary:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Send morning summary
        run: |
          curl -s -X POST "https://novus-epoxy.vercel.app/api/cron/morning-summary" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_API_KEY }}" \
            -H "Content-Type: application/json" \
            --max-time 30
