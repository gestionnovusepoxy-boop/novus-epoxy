name: Deploy PHP vers Hostinger

on:
  # Disabled — site vitrine novusepoxy.ca tourne ailleurs.
  # Manual trigger only si on a besoin de redéployer le PHP legacy.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Déployer via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:    ${{ secrets.FTP_SERVER }}
          username:  ${{ secrets.FTP_USERNAME }}
          password:  ${{ secrets.FTP_PASSWORD }}
          local-dir: ./hostinger/
          server-dir: ${{ secrets.FTP_REMOTE_DIR || '/public_html/api-novus/' }}
          exclude: |
            **/.git*
            **/.env
            **/node_modules/**
