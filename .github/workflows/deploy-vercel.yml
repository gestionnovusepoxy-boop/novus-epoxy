name: Deploy Dashboard vers Vercel

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Installer les dépendances
        working-directory: ./dashboard
        run: npm ci

      - name: Vérification TypeScript
        working-directory: ./dashboard
        run: npx tsc --noEmit

      - name: Build
        working-directory: ./dashboard
        run: npm run build
        env:
          NEXTAUTH_URL:           ${{ secrets.NEXTAUTH_URL }}
          NEXTAUTH_SECRET:        ${{ secrets.NEXTAUTH_SECRET }}
          AUTH_SECRET:            ${{ secrets.NEXTAUTH_SECRET }}
          ADMIN_EMAIL:            ${{ secrets.ADMIN_EMAIL }}
          RESEND_API_KEY:         ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM:             ${{ secrets.EMAIL_FROM }}
          API_SECRET_TOKEN:       ${{ secrets.API_SECRET_TOKEN }}
          NEXT_PUBLIC_API_BASE_URL: https://novusepoxy.ca

      - name: Déployer sur Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:      ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:     ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./dashboard
          vercel-args:       '--prod'
